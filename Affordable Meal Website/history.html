<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order History - HealthyHome Meals</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">

  <style>
    /* 🔥 FORCE WHITE BACKGROUND – NO IMAGE */
    body {
      background: white !important;
      background-image: none !important;
    }

    [data-theme="dark"] body {
      background: white !important;
      background-image: none !important;
    }

    .navbar-brand {
      font-weight: 800;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
      transition: transform 0.3s ease;
    }

    .navbar-brand:hover {
      transform: scale(1.05);
      text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.5);
    }

    .navbar-nav .nav-link {
      font-weight: 600;
      padding: 10px 20px;
      margin: 0 5px;
      border-radius: 25px;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .navbar-nav .nav-link::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transition: left 0.5s ease;
    }

    .navbar-nav .nav-link:hover::before {
      left: 100%;
    }

    .navbar-nav .nav-link:hover {
      background: rgba(255, 255, 255, 0.1);
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(255, 0, 0, 0.4);
    }

    .navbar-toggler {
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 10px;
      padding: 8px 12px;
      transition: all 0.3s ease;
    }

    .navbar-toggler:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.5);
      transform: scale(1.05);
    }

    .navbar-toggler-icon {
      background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3e%3cpath stroke='rgba%28255, 255, 255, 0.8%29' stroke-linecap='round' stroke-miterlimit='10' stroke-width='2' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e");
    }

    .order-card {
      transition: transform 0.3s;
    }

    .order-card:hover {
      transform: translateY(-5px);
    }

    .status-preparing {
      color: #f39c12;
      font-weight: bold;
    }

    .status-out {
      color: #3498db;
      font-weight: bold;
    }

    .status-delivered {
      color: #27ae60;
      font-weight: bold;
    }

    .status-cancelled {
      color: #e74c3c;
      font-weight: bold;
    }
  </style>
</head>

<body class="bg-light">

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="index.html">Affordable Meals</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="history.html">Order History</a></li>
          <li class="nav-item"><a class="nav-link" href="help.html">Help</a></li>
          <li class="nav-item"><a class="nav-link" href="contact.html">Contact Us</a></li>
          <li class="nav-item"><a class="nav-link" href="subscriptions.html">Subscriptions</a></li>
          <li class="nav-item"><a class="nav-link" href="profile.html">Profile</a></li>
          <li class="nav-item"><a class="nav-link" href="menu.html">Menu</a></li>
          <li class="nav-item"><a class="nav-link" href="reviews.html">Reviews</a></li>
          <li class="nav-item"><a class="nav-link" href="tracking.html">Track your order</a></li>
          <li class="nav-item"><a class="nav-link active" href="cart.html">Cart (<span id="cart-count">0</span>)</a></li>
          <li class="nav-item"><button id="theme-toggle" class="btn btn-outline-light btn-sm"
              title="Toggle Dark/Light Mode"><i class="fas fa-moon"></i> Dark Mode</button></li>
          <li class="nav-item"><a class="nav-link" href="join-as-cook.html">Join as Cook</a></li>
        </ul>
      </div>
    </div>
  </nav>
  <div class="container mt-5 pt-5">
    <h2 class="text-center mb-5">Your Order History</h2>

    <div id="no-orders" class="text-center text-muted d-none">
      <p>You haven't placed any orders yet.</p>
      <a href="menu.html" class="btn btn-primary mt-3">Browse Menu</a>
    </div>

    <div id="order-list" class="row g-4"></div>
  </div>

  <!-- Scripts -->
  <script type="module" src="firebase-config.js"></script>
  <script type="module" src="script-new.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Theme Toggle Script -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const themeToggle = document.getElementById('theme-toggle');
      if (themeToggle) {
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        updateThemeToggleButton(savedTheme);

        themeToggle.addEventListener('click', () => {
          const currentTheme = document.documentElement.getAttribute('data-theme');
          const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
          document.documentElement.setAttribute('data-theme', newTheme);
          localStorage.setItem('theme', newTheme);
          updateThemeToggleButton(newTheme);
        });
      }
    });

    function updateThemeToggleButton(theme) {
      const themeToggle = document.getElementById('theme-toggle');
      if (themeToggle) {
        themeToggle.innerText = theme === 'dark' ? 'Light Mode' : 'Dark Mode';
      }
    }
  </script>
</body>

</html>
