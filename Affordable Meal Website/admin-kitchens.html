<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Manage Kitchen Registrations</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
<style>
    body {
      background: #ffffff !important;
      background-image: none !important;
    }

    .pending-card {
      border-left: 5px solid #ffc107;
    }

    .approved-card {
      border-left: 5px solid #28a745;
    }

    .rejected-card {
      border-left: 5px solid #dc3545;
      opacity: 0.7;
    }

    .action-btn {
      min-width: 100px;
    }
  </style>
</head>

<body class="bg-light">

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">HealthyHome Meals - Admin</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="menu.html">Menu</a></li>
          <li class="nav-item"><a class="nav-link text-danger fw-bold" href="#" id="logout-btn">Logout</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container mt-5 pt-5">
    <h2 class="text-center mb-5">Admin Dashboard - Kitchen Registrations</h2>

    <div id="loading" class="text-center my-5">
      <div class="spinner-border text-primary" role="status"></div>
      <p class="mt-3">Loading pending registrations...</p>
    </div>

    <div id="no-pending" class="text-center text-muted d-none">
      <p>No pending kitchen registrations at the moment.</p>
    </div>

    <div id="kitchens-list" class="row g-4"></div>
  </div>

  <!-- Scripts -->
  <script type="module" src="firebase-config.js"></script>
  <script type="module">
    import { auth, db, collection, getDocs, doc, updateDoc, deleteDoc } from './firebase-config.js';

    // Only allow specific admin UID (change this to YOUR UID)
    const ADMIN_UID = "4wnzy7pcKXZfZfBJFqoA7SjTTrr1"; // ← Replace with your Firebase UID

    async function loadPendingKitchens() {
      const kitchensList = document.getElementById('kitchens-list');
      const loading = document.getElementById('loading');
      const noPending = document.getElementById('no-pending');

      loading.classList.remove('d-none');
      kitchensList.innerHTML = '';
      noPending.classList.add('d-none');

      try {
        const user = auth.currentUser;
        if (!user || user.uid !== ADMIN_UID) {
          kitchensList.innerHTML = '<p class="text-danger text-center">Access denied. Admin only.</p>';
          loading.classList.add('d-none');
          return;
        }

        const querySnapshot = await getDocs(collection(db, 'pending_kitchens'));
        let count = 0;

        querySnapshot.forEach((docSnap) => {
          count++;
          const data = docSnap.data();
          const statusClass = data.approved ? 'approved-card' : (data.rejected ? 'rejected-card' : 'pending-card');
          const statusText = data.approved ? 'Approved' : (data.rejected ? 'Rejected' : 'Pending');

          kitchensList.innerHTML += `
            <div class="col-md-6 col-lg-4">
              <div class="card ${statusClass} shadow-sm">
                <div class="card-body">
                  <h5 class="card-title">${data.name || 'Unnamed Cook'}</h5>
                  <p class="card-text mb-1"><strong>Phone:</strong> ${data.phone || 'N/A'}</p>
                  <p class="card-text mb-1"><strong>Location:</strong> ${data.location || 'N/A'}</p>
                  <p class="card-text mb-1"><strong>Specialty:</strong> ${data.specialty || 'N/A'}</p>
                  <p class="card-text mb-1"><strong>Daily Capacity:</strong> ${data.capacity || 'N/A'} tiffins</p>
                  <p class="card-text mb-3"><strong>Status:</strong> <span class="fw-bold">${statusText}</span></p>

                  ${!data.approved && !data.rejected ? `
                    <div class="d-flex gap-2">
                      <button class="btn btn-success action-btn approve-btn" data-id="${docSnap.id}">
                        Approve
                      </button>
                      <button class="btn btn-danger action-btn reject-btn" data-id="${docSnap.id}">
                        Reject
                      </button>
                    </div>
                  ` : ''}
                </div>
              </div>
            </div>
          `;
        });

        loading.classList.add('d-none');

        if (count === 0) {
          noPending.classList.remove('d-none');
        }

        // Add event listeners for approve/reject buttons
        document.querySelectorAll('.approve-btn').forEach(btn => {
          btn.addEventListener('click', async () => {
            if (confirm("Approve this cook?")) {
              const docId = btn.dataset.id;
              await updateDoc(doc(db, 'pending_kitchens', docId), {
                approved: true,
                rejected: false,
                status: 'approved',
                approvedAt: new Date()
              });
              alert("Cook approved!");
              loadPendingKitchens(); // Refresh list
            }
          });
        });

        document.querySelectorAll('.reject-btn').forEach(btn => {
          btn.addEventListener('click', async () => {
            if (confirm("Reject this cook?")) {
              const docId = btn.dataset.id;
              await updateDoc(doc(db, 'pending_kitchens', docId), {
                approved: false,
                rejected: true,
                status: 'rejected',
                rejectedAt: new Date()
              });
              alert("Cook rejected.");
              loadPendingKitchens(); // Refresh list
            }
          });
        });

      } catch (error) {
        console.error("Error loading kitchens:", error);
        kitchensList.innerHTML = '<p class="text-danger text-center">Failed to load registrations. Check console.</p>';
        loading.classList.add('d-none');
      }
    }

    // Protect page – redirect if not admin
    auth.onAuthStateChanged((user) => {
      if (!user || user.uid !== ADMIN_UID) {
        alert("Admin access only.");
        window.location.href = 'login.html';
      } else {
        loadPendingKitchens();
      }
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
