<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Join as Cook - HealthyHome Meals</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
<style>
    body {
      background: #ffffff !important;
      background-image: none !important;
    }

    .form-card {
      max-width: 600px;
      margin: 0 auto;
      background: white;
      padding: 2rem;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    }

    .form-header {
      text-align: center;
      margin-bottom: 2rem;
    }
  </style>
</head>

<body class="bg-light">

  <!-- Navbar (copy from your other pages) -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">HealthyHome Meals</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="menu.html">Menu</a></li>
          <li class="nav-item"><a class="nav-link" href="cart.html">Cart (<span id="cart-count">0</span>)</a></li>
          <li class="nav-item"><a class="nav-link" href="reviews.html">Reviews</a></li>
          <li class="nav-item"><a class="nav-link" href="profile.html">Profile</a></li>
          <li class="nav-item"><a class="nav-link text-danger fw-bold" href="#" id="logout-btn">Logout</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container mt-5 pt-5">
    <div class="form-header">
      <h2 class="fw-bold text-success">Join as a Home Chef / Kitchen Partner</h2>
      <p class="lead text-muted">Earn by cooking fresh, healthy meals for our customers</p>
    </div>

    <div class="form-card shadow">
      <form id="cook-registration-form">
        <div class="mb-3">
          <label for="name" class="form-label fw-bold">Full Name *</label>
          <input type="text" class="form-control" id="name" placeholder="Your full name" required>
        </div>

        <div class="mb-3">
          <label for="phone" class="form-label fw-bold">WhatsApp Phone Number *</label>
          <input type="tel" class="form-control" id="phone" placeholder="e.g., 9876543210" required pattern="[0-9]{10}">
        </div>

        <div class="mb-3">
          <label for="location" class="form-label fw-bold">Kitchen Location (Area in Mumbai) *</label>
          <input type="text" class="form-control" id="location" placeholder="e.g., Pimpri, Andheri East, Borivali"
            required>
        </div>

        <div class="mb-3">
          <label for="specialty" class="form-label fw-bold">What do you specialize in? *</label>
          <select class="form-select" id="specialty" required>
            <option value="">Select one</option>
            <option value="Veg/Jain">Veg / Jain only</option>
            <option value="Non-Veg">Non-Veg</option>
            <option value="Both">Both Veg & Non-Veg</option>
          </select>
        </div>

        <div class="mb-3">
          <label for="capacity" class="form-label fw-bold">How many tiffins can you prepare daily? *</label>
          <input type="number" class="form-control" id="capacity" min="5" max="200" placeholder="e.g., 30" required>
        </div>

        <div class="mb-3">
          <label for="kitchen-photo" class="form-label fw-bold">Upload Kitchen Photo (optional – helps build
            trust)</label>
          <input type="file" class="form-control" id="kitchen-photo" accept="image/*">
        </div>

        <div class="mb-3 form-check">
          <input type="checkbox" class="form-check-input" id="terms" required>
          <label class="form-check-label" for="terms">
            I agree to the <a href="#">terms & conditions</a> and confirm the information is correct.
          </label>
        </div>

        <button type="submit" class="btn btn-success w-100 py-3 fw-bold">Submit Registration</button>
      </form>
    </div>

    <div class="text-center mt-4">
      <p class="text-muted">We'll review your application and contact you within 24–48 hours via WhatsApp.</p>
    </div>
  </div>

  <!-- Scripts -->
  <script type="module">
    import { db, collection, addDoc } from './firebase-config.js';

    document.getElementById('cook-registration-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const name = document.getElementById('name').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const location = document.getElementById('location').value.trim();
      const specialty = document.getElementById('specialty').value;
      const capacity = parseInt(document.getElementById('capacity').value);

      if (!name || !phone || !location || !specialty || !capacity) {
        alert("Please fill all required fields.");
        return;
      }

      try {
        await addDoc(collection(db, 'pending_kitchens'), {
          name,
          phone,
          location,
          specialty,
          capacity,
          status: 'pending',
          timestamp: new Date(),
          approved: false
        });
        const formContainer = document.querySelector('.form-card');
        formContainer.innerHTML = `
    <div class="text-center py-5">
      <i class="fas fa-check-circle text-success fa-5x mb-4"></i>
      <h3 class="text-success mb-3">Registration Submitted Successfully!</h3>
      <p class="lead text-muted mb-4">
        Thank you! Your application is under review.<br>
        We'll contact you within 24–48 hours via WhatsApp.
      </p>
      <p class="mb-4">Already approved? Login to your cook dashboard now.</p>
      <a href="cook-login.html" class="btn btn-success btn-lg px-5 py-3">
        Go to Cook Login
      </a>
      <p class="mt-4">
        <a href="join-as-cook.html" class="text-primary">Register another account</a>
      </p>
    </div>
  `;

      } catch (error) {
        console.error("Registration error:", error);
        alert("Something went wrong. Please try again or contact support.");
      }
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
