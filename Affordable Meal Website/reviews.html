<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reviews - Affordable Meals</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body {
      background: white;
      background-attachment: fixed;
      min-height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .navbar {
      background: linear-gradient(135deg, #FF0000 0%, #FF4444 50%, #FF6666 100%) !important;
      backdrop-filter: blur(15px);
      border-bottom: 2px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 4px 20px rgba(255, 0, 0, 0.3);
      border-radius: 0 0 15px 15px;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
    }

    .text-black {
      color: black !important;
    }

    .text-black-50 {
      color: rgba(0, 0, 0, 0.8) !important;
    }

    .btn-primary {
      background: linear-gradient(45deg, #ff0000, #ff4500);
      border: none;
      transition: all 0.3s ease;
      border-radius: 25px;
      padding: 0.75rem 1.5rem;
      font-weight: 600;
      box-shadow: 0 4px 15px rgba(255, 0, 0, 0.3);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(255, 0, 0, 0.5);
    }
  </style>
</head>

<body class="bg-light">

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="index.html">Affordable Meals</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="history.html">Order History</a></li>
          <li class="nav-item"><a class="nav-link" href="help.html">Help</a></li>
          <li class="nav-item"><a class="nav-link" href="contact.html">Contact Us</a></li>
          <li class="nav-item"><a class="nav-link" href="subscriptions.html">Subscriptions</a></li>
          <li class="nav-item"><a class="nav-link" href="profile.html">Profile</a></li>
          <li class="nav-item"><a class="nav-link" href="menu.html">Menu</a></li>
          <li class="nav-item"><a class="nav-link" href="tracking.html">Track your order</a></li>
          <li class="nav-item"><a class="nav-link active" href="cart.html">Cart (<span id="cart-count">0</span>)</a></li>
          <li class="nav-item"><button id="theme-toggle" class="btn btn-outline-light btn-sm"
              title="Toggle Dark/Light Mode"><i class="fas fa-moon"></i> Dark Mode</button></li>
          <li class="nav-item"><a class="nav-link" href="join-as-cook.html">Join as Cook</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container mt-5">
    <div class="text-center mb-5">
      <h2 class="display-5 fw-bold text-black mb-3" style="text-shadow: 2px 2px 4px rgba(0,0,0,0.3);">⭐ Customer Reviews
      </h2>
      <p class="lead text-black-50">Share your experience and read what others are saying</p>
    </div>

    <div class="row g-5">
      <!-- Review Form -->
      <div class="col-lg-6">
        <div class="glass-card p-4 mb-5">
          <h4 class="text-black text-center mb-4" style="text-shadow: 2px 2px 4px rgba(0,0,0,0.3);">Share Your Review
          </h4>
          <form id="review-form">
            <div class="mb-3">
              <label class="form-label text-black fw-bold">Meal Name</label>
              <input type="text" class="form-control" id="meal-name" placeholder="e.g., Dal Rice + Roti" required>
            </div>
            <div class="mb-3">
              <label class="form-label text-black fw-bold">Rating</label>
              <select class="form-select" id="rating" required>
                <option value="">Select stars</option>
                <option value="5">5 Stars - Excellent</option>
                <option value="4">4 Stars - Good</option>
                <option value="3">3 Stars - Average</option>
                <option value="2">2 Stars - Poor</option>
                <option value="1">1 Star - Bad</option>
              </select>
            </div>
            <div class="mb-3">
              <label class="form-label text-black fw-bold">Your Review</label>
              <textarea class="form-control" id="review-text" rows="4" placeholder="Tell us about your experience..."
                required></textarea>
            </div>
            <div class="mb-3">
              <label class="form-label text-black fw-bold">Upload Photo (optional)</label>
              <input type="file" class="form-control" id="review-photo" accept="image/*">
            </div>
            <button type="submit" class="btn btn-primary w-100 fw-bold">Submit Review</button>
          </form>
        </div>
      </div>

      <!-- Reviews List -->
      <div class="col-lg-6">
        <div class="glass-card p-4">
          <h4 class="text-black text-center mb-4" style="text-shadow: 2px 2px 4px rgba(0,0,0,0.3);">What Others Are
            Saying</h4>
          <div id="reviews-list" class="row"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script type="module" src="firebase-config.js"></script>
  <script type="module" src="script-new.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Login/Logout Logic -->
  <script type="module">
    import { auth, onAuthStateChanged } from './firebase-config.js';

    onAuthStateChanged(auth, (user) => {
      const loginItem = document.getElementById('login-item');
      const logoutItem = document.getElementById('logout-item');

      if (user) {
        loginItem?.classList.add('d-none');
        logoutItem?.classList.remove('d-none');
      } else {
        loginItem?.classList.remove('d-none');
        logoutItem?.classList.add('d-none');
      }
    });

    // Logout – Redirect to home page
    document.getElementById('logout-btn')?.addEventListener('click', async (e) => {
      e.preventDefault();
      await auth.signOut();
      alert("Logged out successfully!");
      window.location.href = 'index.html';  // Back to home page
    });
  </script>
</body>

</html>
