<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cook Login - HealthyHome Meals</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      background-color: #ffffff !important;
      color: #000000;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-container {
      max-width: 450px;
      width: 100%;
      padding: 2.5rem;
      background: #ffffff;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(255, 0, 0, 0.1);
      border: 2px solid #ff0000;
    }

    .login-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .login-header h2 {
      color: #ff0000;
      font-weight: bold;
    }

    .form-label {
      color: #ff0000;
      font-weight: 600;
    }

    .btn-cook-login {
      background-color: #ff0000;
      border-color: #ff0000;
      color: white;
      font-weight: bold;
      transition: all 0.3s;
    }

    .btn-cook-login:hover {
      background-color: #cc0000;
      border-color: #cc0000;
      transform: translateY(-2px);
    }

    .text-red {
      color: #ff0000 !important;
    }

    .link-red {
      color: #ff0000;
      font-weight: 600;
    }

    .link-red:hover {
      color: #cc0000;
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <div class="login-container">
    <div class="login-header">
      <h2><i class="fas fa-chef-hat me-2"></i> Cook Login</h2>
      <p class="text-muted">Access your kitchen dashboard</p>
    </div>

    <form id="cook-login-form">
      <div class="mb-3">
        <label for="email" class="form-label">Email Address</label>
        <input type="email" class="form-control" id="email" placeholder="Enter your email" required>
      </div>

      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password" class="form-control" id="password" placeholder="Enter your password" required>
      </div>

      <button type="submit" class="btn btn-cook-login w-100 py-3 mt-3">
        Login as Cook
      </button>
    </form>

    <div class="text-center mt-4">
      <p>New cook? <a href="join-as-cook.html" class="link-red">Register here</a></p>
      <p><a href="index.html" class="text-muted">Back to Home</a></p>
    </div>
  </div>

  <!-- Scripts -->
  <script type="module">
    import { auth, signInWithEmailAndPassword } from './firebase-config.js';

    document.getElementById('cook-login-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();

      try {
        await signInWithEmailAndPassword(auth, email, password);
        alert("Login successful! Redirecting to your dashboard...");
        window.location.href = 'cook-dashboard.html';
      } catch (error) {
        console.error("Login error:", error);
        alert("Login failed: " + error.message);
      }
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
