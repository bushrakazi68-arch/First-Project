<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login / Sign Up - Affordable Meals</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #ffffff 0%, #ffe6e6 50%, #ffcccc 100%);
      background-attachment: fixed;
      min-height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .navbar {
      background: red !important;
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(0, 0, 0, 0.3);
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border: 2px solid black;
      border-radius: 25px;
      box-shadow: 0 15px 35px rgba(255, 0, 0, 0.1);
      animation: fadeInUp 0.8s ease-out;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .btn-primary {
      background: linear-gradient(45deg, #ff0000, #cc0000);
      border: none;
      color: white;
      transition: all 0.3s ease;
      border-radius: 25px;
      font-weight: bold;
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(255, 0, 0, 0.5);
    }

    .btn-gradient {
      background: linear-gradient(45deg, #ff0000, #cc0000);
      border: none;
      color: white;
      transition: all 0.3s ease;
    }

    .btn-gradient:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(255, 0, 0, 0.4);
    }

    .btn-success {
      background: linear-gradient(45deg, #ff0000, #cc0000);
      border: none;
      transition: all 0.3s ease;
      border-radius: 25px;
      font-weight: bold;
    }

    .btn-success:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(255, 0, 0, 0.5);
    }

    .form-control {
      border-radius: 15px;
      border: 2px solid black;
      background: white;
      color: black;
      padding: 0.75rem 1rem 0.75rem 3rem;
      transition: all 0.3s ease;
      position: relative;
    }

    .form-control:focus {
      border-color: black;
      box-shadow: 0 0 0 0.2rem rgba(0, 0, 0, 0.25);
      background: white;
      transform: scale(1.02);
    }

    .form-control::placeholder {
      color: rgba(0, 0, 0, 0.6);
    }

    .input-group {
      position: relative;
    }

    .input-group .form-control {
      padding-left: 3rem;
    }

    .input-group .input-group-text {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: transparent;
      border: none;
      color: red;
      z-index: 5;
    }

    .text-white {
      color: black !important;
    }

    .text-white-50 {
      color: rgba(0, 0, 0, 0.8) !important;
    }

    h3 {
      font-size: 2.5rem;
      font-weight: bold;
      color: red !important;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
    }

    h5 {
      color: red !important;
      font-weight: 600;
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="row justify-content-center mt-5">
      <div class="col-md-6 col-lg-5">
        <div class="glass-card p-4 mt-5">
          <h3 class="text-center mb-4 text-white" style="text-shadow: 2px 2px 4px rgba(0,0,0,0.3);">👋 Welcome</h3>

          <!-- Sign Up Form -->
          <form id="signup-form">
            <h5 class="mb-3 text-white"><i class="fas fa-user-plus me-2"></i>Create Account</h5>
            <div class="input-group mb-3">
              <span class="input-group-text"><i class="fas fa-envelope"></i></span>
              <input type="email" id="signup-email" class="form-control" placeholder="Email" required>
            </div>
            <div class="input-group mb-3">
              <span class="input-group-text"><i class="fas fa-lock"></i></span>
              <input type="password" id="signup-password" class="form-control" placeholder="Password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 fw-bold"><i class="fas fa-rocket me-2"></i>Sign Up</button>
          </form>



          <!-- Login Form -->
          <form id="login-form">
            <h5 class="mb-3 text-white"><i class="fas fa-sign-in-alt me-2"></i>Already have an account?</h5>
            <div class="input-group mb-3">
              <span class="input-group-text"><i class="fas fa-envelope"></i></span>
              <input type="email" id="login-email" class="form-control" placeholder="Email" required>
            </div>
            <div class="input-group mb-3">
              <span class="input-group-text"><i class="fas fa-lock"></i></span>
              <input type="password" id="login-password" class="form-control" placeholder="Password" required>
            </div>
            <button type="submit" class="btn btn-success w-100 fw-bold"><i class="fas fa-door-open me-2"></i>Login</button>
          </form>
        </div>
      </div>
    </div>
  </div>
<!-- Firebase config first (must load before script.js) -->
<script type="module" src="firebase-config.js"></script>

<script type="module" src="script-new.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- Debug helpers – add this temporarily -->
<script>
  console.log("HTML loaded successfully");
  window.addEventListener('error', (e) => {
    console.error("Global error:", e.message, e.filename, e.lineno);
  });
</script>

</script>
</body>

</html>
</body>

</html>
